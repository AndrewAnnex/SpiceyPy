name: Publish Python 🐍 distributions 📦 to PyPI and TestPyPI

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

env:
  # Base URL for the CSPICE release mirror (archived + hashed NAIF toolkits)
  MIRROR_BASE: https://raw.githubusercontent.com/AndrewAnnex/cspice-release-mirror/refs/heads/main/artifacts
  # bump to invalidate the cached CSPICE mirror archive
  CSPICE_CACHE: 0

jobs:
  build_sdist:
    name: Make SpiceyPy 🌶️ 🥧 Python 🐍 source distribution
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout 🌶️ 🥧
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up uv 🐍 📦
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Build 🛠️ sdist source for 🌶️ 🥧 SpiceyPy
        run: |
          uv build --sdist
          echo "contents of dist folder: "
          ls dist/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifact-sdist-${{ hashFiles('pyproject.toml') }}
          path: dist/*.tar.gz
  test_sdist:
    name: Test SpiceyPy 🌶️ 🥧 Python 🐍 source distribution
    needs: [build_sdist]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          [
            ubuntu-22.04-arm,
            ubuntu-latest,
            macos-15,
            macos-15-intel,
            windows-latest,
          ]
        # Attach the matching mirror archive per OS (CSPICE C source is
        # architecture-independent, so aarch64 Linux reuses the x86_64 archive).
        include:
          - { os: ubuntu-22.04-arm, archive: N67_lin_x64_cspice.tar.gz }
          - { os: ubuntu-latest,    archive: N67_lin_x64_cspice.tar.gz }
          - { os: macos-15,         archive: N67_mac_arm_cspice.tar.gz }
          - { os: macos-15-intel,   archive: N67_mac_x64_cspice.tar.gz }
          - { os: windows-latest,   archive: N67_win_x64_cspice.zip }
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout 🌶️ 🥧
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          merge-multiple: true
          path: dist
      - name: Display structure of downloaded files
        run: ls dist/
      - name: Setup windows msvc
        if: ${{ matrix.os == 'windows-latest' }}
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
      - name: Set up uv 🐍 📦 with Python 3.13
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.13"
          activate-environment: true
          enable-cache: true
      - name: Display Python 🐍
        run: python --version
      - name: Install CI dependencies
        run: |
          uv pip install --group dev
      # Provide CSPICE from the mirror so the sdist build reuses a cached,
      # hash-verified archive instead of downloading from NAIF. The build runs
      # directly on the runner (no container), so CSPICE_SRC is a host path on
      # every OS. cspice-cmake-spiceypy copies + patches this tree, never mutating it.
      - name: Cache CSPICE mirror archive
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: cspice-src-cache/${{ matrix.archive }}
          key: cspice-mirror-${{ matrix.archive }}-${{ env.CSPICE_CACHE }}
      - name: Provision CSPICE source from mirror
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p cspice-src-cache
          archive="cspice-src-cache/${{ matrix.archive }}"
          if [ ! -f "$archive" ]; then
            echo "Cache miss; downloading ${{ matrix.archive }} from mirror"
            curl -fsSL "${MIRROR_BASE}/${{ matrix.archive }}" -o "$archive"
          else
            echo "Cache hit; using cached $archive"
          fi
          # Always verify against the mirror's sha256 sidecar (also checks cache integrity)
          curl -fsSL "${MIRROR_BASE}/${{ matrix.archive }}.sha256" -o "$archive.sha256"
          expected="$(tr -d '[:space:]' < "$archive.sha256")"
          actual="$(cmake -E sha256sum "$archive" | awk '{print $1}')"
          if [ "$expected" != "$actual" ]; then
            echo "::error::SHA256 mismatch for ${{ matrix.archive }}"
            exit 1
          fi
          echo "Checksum OK"
          rm -rf cspice-src-cache/cspice
          ( cd cspice-src-cache && cmake -E tar xf "${{ matrix.archive }}" )
          test -d cspice-src-cache/cspice/src/cspice
          test -d cspice-src-cache/cspice/include
          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "CSPICE_SRC=$(cygpath -m "$(pwd)/cspice-src-cache/cspice")" >> "$GITHUB_ENV"
          else
            echo "CSPICE_SRC=$(pwd)/cspice-src-cache/cspice" >> "$GITHUB_ENV"
          fi
          echo "Provisioned CSPICE_SRC for ${{ runner.os }}"
      - name: Install SpiceyPy 🌶️ 🥧 from sdist on Mac/Linux
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        run: |
          echo "Running uv pip install from sdist"
          uv pip install dist/*.tar.gz --no-build-isolation -v
      - name: Install SpiceyPy 🌶️ 🥧 from sdist on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        shell: cmd
        run: |
          for /f %%f in ('dir /b dist\*.tar.gz') do (
            uv pip install dist\%%f --no-build-isolation -v
          )
      - name: Test 🧪 with coverage 📈
        run: |
          coverage run --source spiceypy -m pytest --pyargs spiceypy --benchmark-disable
      - name: Upload 🆙 coverage 📈 report to codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          fail_ci_if_error: false
          verbose: true
          use_oidc: true
  build_wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          # CSPICE C source is architecture-independent, so the aarch64 Linux job
          # reuses the x86_64 Linux archive. Pyodide/emscripten uses the 32-bit
          # Linux package (matches the PC_Linux_GCC_32bit toolkit it downloads).
          - { name: Linux,   os: ubuntu-latest,    arch: x86_64,  archive: N67_lin_x64_cspice.tar.gz }
          - { name: Linux,   os: ubuntu-22.04-arm, arch: aarch64, archive: N67_lin_x64_cspice.tar.gz }
          - { name: macOS,   os: macos-15-intel,   arch: x86_64,  archive: N67_mac_x64_cspice.tar.gz }
          - { name: macOS,   os: macos-15,         arch: arm64,   archive: N67_mac_arm_cspice.tar.gz }
          - { name: Windows, os: windows-latest,   arch: AMD64,   archive: N67_win_x64_cspice.zip }
          - { name: Pyodide, os: ubuntu-latest,    arch: wasm32,  archive: N67_lin_x86_cspice.tar.gz, platform: pyodide }
    name: Build SpiceyPy 🌶️ 🥧 Python 🐍 wheels for ${{ matrix.os }} ${{ matrix.arch }}
    env:
      CIBW_PLATFORM: ${{ matrix.platform || 'auto' }}
      CIBW_ARCHS: ${{ matrix.arch }}
      CMAKE_BUILD_PARALLEL_LEVEL: 4
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout 🌶️ 🥧
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup 🔬🍦🏗️
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
      - name: set additional environment variables for macOS arm
        if: runner.os == 'macOS' && matrix.arch == 'arm64'
        run: |
          echo "CIBW_ARCHS_MACOS=arm64" >> $GITHUB_ENV
          echo "ARCHFLAGS=-arch arm64" >> $GITHUB_ENV
      - name: set additional environment variables for macOS x86
        if: runner.os == 'macOS' && matrix.arch == 'x86_64'
        run: |
          echo "CIBW_ARCHS_MACOS=x86_64" >> $GITHUB_ENV
          echo "ARCHFLAGS=-arch x86_64" >> $GITHUB_ENV
          echo "CMAKE_TLS_VERIFY=0" >> $GITHUB_ENV
      - name: set additional environment variables for linux aarch64
        if: runner.os == 'Linux' && matrix.arch == 'aarch64'
        run: |
          echo "CIBW_ARCHS_LINUX=aarch64" >> $GITHUB_ENV
          echo "ARCHFLAGS=-arch aarch64" >> $GITHUB_ENV
      - name: Print ARCHFLAGS
        run: |
          echo "ARCHFLAGS is: $ARCHFLAGS"
      # -----------------------------------------------------------------------
      # Provide the CSPICE source once per job from the mirror, so cibuildwheel's
      # wheels reuse a single hash-verified download instead of re-fetching from
      # NAIF for every wheel (4x for native CPython, 1x for Pyodide). The
      # cspice-cmake-spiceypy CMake copies and patches CSPICE_SRC into the build
      # tree, so this tree is never mutated.
      # -----------------------------------------------------------------------
      - name: Cache CSPICE mirror archive
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: cspice-src-cache/${{ matrix.archive }}
          key: cspice-mirror-${{ matrix.archive }}-${{ env.CSPICE_CACHE }}
      - name: Provision CSPICE source from mirror
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p cspice-src-cache
          archive="cspice-src-cache/${{ matrix.archive }}"
          if [ ! -f "$archive" ]; then
            echo "Cache miss; downloading ${{ matrix.archive }} from mirror"
            curl -fsSL "${MIRROR_BASE}/${{ matrix.archive }}" -o "$archive"
          else
            echo "Cache hit; using cached $archive"
          fi
          # Always verify against the mirror's sha256 sidecar (also checks cache integrity)
          curl -fsSL "${MIRROR_BASE}/${{ matrix.archive }}.sha256" -o "$archive.sha256"
          expected="$(tr -d '[:space:]' < "$archive.sha256")"
          actual="$(cmake -E sha256sum "$archive" | awk '{print $1}')"
          echo "expected sha256: $expected"
          echo "actual   sha256: $actual"
          if [ "$expected" != "$actual" ]; then
            echo "::error::SHA256 mismatch for ${{ matrix.archive }}"
            exit 1
          fi
          echo "Checksum OK"
          # Fresh extraction every run (cmake -E tar autodetects .tar.gz and .zip)
          rm -rf cspice-src-cache/cspice
          ( cd cspice-src-cache && cmake -E tar xf "${{ matrix.archive }}" )
          test -d cspice-src-cache/cspice/src/cspice
          test -d cspice-src-cache/cspice/include
          # Export CSPICE_SRC at a path valid inside the wheel build environment,
          # plus SPICEYPY_CSPICE_PREFIX pointing at where cibuildwheel's before-all
          # will install the once-per-job CSPICE build (see [tool.cibuildwheel]
          # before-all in pyproject.toml). The prefix does not exist yet; this only
          # computes the path. Pyodide is deliberately left without a prefix so its
          # CMake build falls through to the in-tree FetchContent path.
          if [ "${{ matrix.platform }}" = "pyodide" ]; then
            # Pyodide/emscripten builds run directly on the host (no container)
            echo "CSPICE_SRC=$(pwd)/cspice-src-cache/cspice" >> "$GITHUB_ENV"
          elif [ "${{ runner.os }}" = "Linux" ]; then
            # native CPython Linux wheels build in the manylinux container, which
            # cibuildwheel mounts the project into at /project
            echo "CSPICE_SRC=/project/cspice-src-cache/cspice" >> "$GITHUB_ENV"
            echo "SPICEYPY_CSPICE_PREFIX=/project/cspice-prefix" >> "$GITHUB_ENV"
          elif [ "${{ runner.os }}" = "Windows" ]; then
            echo "CSPICE_SRC=$(cygpath -m "$(pwd)/cspice-src-cache/cspice")" >> "$GITHUB_ENV"
            echo "SPICEYPY_CSPICE_PREFIX=$(cygpath -m "$(pwd)/cspice-prefix")" >> "$GITHUB_ENV"
          else
            echo "CSPICE_SRC=$(pwd)/cspice-src-cache/cspice" >> "$GITHUB_ENV"
            echo "SPICEYPY_CSPICE_PREFIX=$(pwd)/cspice-prefix" >> "$GITHUB_ENV"
          fi
          echo "Provisioned CSPICE_SRC for ${{ matrix.name }} (${{ runner.os }})"
      - name: Set up uv 🐍 📦 with Python 3.14
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.14"
          activate-environment: true
          enable-cache: true
      - name: Display Python 🐍 Version
        run: python --version
      - name: Install dependencies
        run: |
          uv pip install --group devwheel
      - name: Build wheels for SpiceyPy 🌶️ 🥧
        uses: pypa/cibuildwheel@294735312765b09d24a2fbec22660ce817587d55 # v4.1.0
        env:
          CIBW_PLATFORM: ${{ matrix.platform || 'auto' }}
          CIBW_ARCHS: ${{ matrix.arch }}
          CMAKE_BUILD_PARALLEL_LEVEL: 4
          # CMAKE_BUILD_PARALLEL_LEVEL is deliberately NOT repeated below. The job
          # env above is the single source of its value; Linux containers receive it
          # via pyproject's `environment-pass`, and macOS/Windows build on the host
          # and inherit it directly. Re-stating it in CIBW_ENVIRONMENT_* duplicates
          # the value into a place that only wins by assignment ordering, so a future
          # mismatch would be silent.
          #
          # Hand the prepared CSPICE source to the build via the env var that
          # cspice-cmake-spiceypy reads. These are platform-specific on purpose:
          #   * Linux native wheels build in a container, so the value must be the
          #     in-container /project path (host env is not inherited there).
          #   * macOS/Windows build on the host; this sets it explicitly.
          # Pyodide is intentionally omitted here so it keeps pyproject's
          # SPICEYPY_PYODIDE/CFLAGS environment; being a non-container build it
          # inherits CSPICE_SRC (host path) from $GITHUB_ENV directly.
          #
          # CMAKE_GENERATOR=Ninja on Windows: scikit-build-core defaults to the
          # multi-config Visual Studio generator there, which costs ~20s of CMake
          # configure per wheel and hands the 2200+ CSPICE files to MSBuild, which
          # does not parallelize sources within a single project. Ninja gives real
          # file-level parallelism at CMAKE_BUILD_PARALLEL_LEVEL. Ninja itself needs
          # no setup step (VS ships one on PATH, and scikit-build-core will pull the
          # PyPI ninja into the isolated build env otherwise), but unlike the VS
          # generator it does NOT locate MSVC on its own -- that comes from the
          # ilammy/msvc-dev-cmd step above, which this job already runs.
          # SPICEYPY_CSPICE_PREFIX is read by both halves of the split: before-all
          # builds CSPICE into it, and each per-wheel CMake configure finds it there
          # instead of rebuilding. cibuildwheel applies CIBW_ENVIRONMENT to before_all
          # as well as to the builds, so one setting covers both.
          CIBW_ENVIRONMENT_LINUX: CSPICE_SRC="${{ env.CSPICE_SRC }}" SPICEYPY_CSPICE_PREFIX="${{ env.SPICEYPY_CSPICE_PREFIX }}"
          CIBW_ENVIRONMENT_MACOS: CSPICE_SRC="${{ env.CSPICE_SRC }}" SPICEYPY_CSPICE_PREFIX="${{ env.SPICEYPY_CSPICE_PREFIX }}"
          CIBW_ENVIRONMENT_WINDOWS: CSPICE_SRC="${{ env.CSPICE_SRC }}" SPICEYPY_CSPICE_PREFIX="${{ env.SPICEYPY_CSPICE_PREFIX }}" CMAKE_GENERATOR="Ninja"
          SKBUILD_BUILD_VERBOSE: "true"
        with:
          extras: "uv"
      - name: Upload wheels for SpiceyPy 🌶️ 🥧
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifact-${{ matrix.os }}-${{ strategy.job-index }}-${{ hashFiles('pyproject.toml') }}
          path: ./wheelhouse/*.whl

  test_with_twine:
    name: Twine 🧵 Sanity Check distributions
    needs: [build_wheels, test_sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: artifact-*
          merge-multiple: true
          path: dist
      - name: Set up uv 🐍 📦
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Check dists
        run: |
          uvx twine check dist/*

  publish_to_test_pypi:
    name: Publish 🌶️ 🥧  📦 to TestPyPI
    needs: [build_wheels, test_sdist, test_with_twine]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/spiceypy
    permissions:
      id-token: write
    steps:
      - name: Checkout 🌶️ 🥧
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: artifact-*
          merge-multiple: true
          path: dist
      - name: Publish distribution 📦 to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          skip-existing: true
          print-hash: true
          verbose: true
          repository-url: https://test.pypi.org/legacy/

  publish_to_pypi:
    name: Publish 🌶️ 🥧  📦 to PyPI
    needs: [build_wheels, test_sdist, test_with_twine, publish_to_test_pypi]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push' && !contains(github.ref_name, '-') && !contains(github.ref_name, 'rc') && !contains(github.ref_name, 'alpha') && !contains(github.ref_name, 'beta')
    environment:
      name: pypi
      url: https://pypi.org/p/spiceypy
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: artifact-*
          merge-multiple: true
          path: dist
      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          skip-existing: true
          print-hash: true
          verbose: true

  upload_wheels_to_release:
    name: Upload wheels to GitHub Release
    needs: [publish_to_test_pypi, publish_to_pypi]
    runs-on: ubuntu-latest
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      github.event_name == 'push' &&
      (needs.publish_to_test_pypi.result == 'success' || needs.publish_to_pypi.result == 'success')
    permissions:
      contents: write
    steps:
      - name: Check release exists
        run: |
          gh release view ${{ github.ref_name }} --repo ${{ github.repository }} || \
            (echo "::error::Release ${{ github.ref_name }} does not exist yet. Create the release in the GitHub UI and re-run this job." && exit 1)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: artifact-*
          merge-multiple: true
          path: dist
      - name: Upload wheels to release
        run: gh release upload ${{ github.ref_name }} dist/*.whl --clobber --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
