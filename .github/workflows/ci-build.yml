name: PR and Merge builds (on main branch)

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    - cron: "0 4 * * 0"
env:
  # increment to rebuild cspice manually
  CSPICE_VERSION: 67
  CSPICE_CACHE_NUMBER: 9
  PYPI_CACHE_NUMBER: 4
  CMAKE_BUILD_PARALLEL_LEVEL: 2

jobs:
  test-pyodide:
    name: Test SpiceyPy Pyodide build
    runs-on: 'ubuntu-latest'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout 🌶️ 🥧
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Set up Python 🐍 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.13
      - name: Build Pyodide wheel for SpiceyPy 🌶️ 🥧
        uses: pypa/cibuildwheel@294735312765b09d24a2fbec22660ce817587d55 # v4.1.0
        env:
          CIBW_PLATFORM: pyodide 
          CIBW_ARCHS: "wasm32"
          CMAKE_BUILD_PARALLEL_LEVEL: 2
          SKBUILD_BUILD_VERBOSE: "true"
  test-conda:
    name: Test SpiceyPy Conda install
    runs-on: 'ubuntu-latest'
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout 🌶️ 🥧
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0
        with:
          environment-name: test-env
          init-shell: >-
            bash
          cache-environment: true
          create-args: >-
            python=3.13
            cspice
            cython
            numpy
            pip
      - name: Install dependencies
        shell: bash -el {0}
        run: |
          python -m pip install --user --group devwheel
      - name: Build SpiceyPy 
        shell: bash -el {0}
        env:
          SYSTEM_VERSION_COMPAT: 0
        run: 
          CMAKE_PREFIX_PATH=$CONDA_PREFIX python -m build
      - name: Install SpiceyPy 🌶️ 🥧
        shell: bash -el {0}
        env:
          SYSTEM_VERSION_COMPAT: 0
        run: 
          python -m pip install dist/*.whl
      - name: Test 🧪 with coverage 📈
        shell: bash -el {0}
        run: |
          python -m coverage run --source spiceypy -m pytest --pyargs spiceypy --benchmark-disable
          # look for .coverage file
          ls -lahtr
      - name: Upload 🆙 coverage 📈 report to codecov 
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          fail_ci_if_error: false
          verbose: true
          use_oidc: true
  test:
    name: Test SpiceyPy 🌶️ 🥧
    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04-arm, ubuntu-latest, macos-15-intel, macos-15, windows-latest]
        python-version: ['3.12', '3.13', '3.14']
    steps:
      - name: Setup windows msvc
        if: ${{ matrix.os == 'windows-latest'}}
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
      - name: Checkout 🌶️ 🥧
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Set up Python 🐍 ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          check-latest: true
      - name: Display Python 🐍 version
        run: python -c "import sys; print(sys.version)"
      - name: Install pip
        run: |
          python -m pip install --upgrade pip
      - name: Install dependencies
        run: |
          python -m pip install --user --group devwheel
      - name: Build SpiceyPy 
        shell: bash
        env:
          SYSTEM_VERSION_COMPAT: 0
        run: 
          python -m build
      - name: Install SpiceyPy 🌶️ 🥧
        shell: bash
        env:
          SYSTEM_VERSION_COMPAT: 0
        run: 
          python -m pip install dist/*.whl
      - name: Test 🧪 with coverage 📈
        shell: bash
        run: |
          python -m coverage run --source spiceypy -m pytest --pyargs spiceypy --benchmark-disable
          # look for .coverage file
          ls -lahtr
      - name: Upload 🆙 coverage 📈 report to codecov 
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          fail_ci_if_error: false
          verbose: true
          use_oidc: true