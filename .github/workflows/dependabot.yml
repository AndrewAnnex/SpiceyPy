# Set update schedule for GitHub Actions

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 2
    schedule:
      # Check for updates to GitHub Actions every week
      interval: "weekly"
      day: "sunday"
    groups:
      # Groups all minor and patch Action updates into one weekly PR
      action-minor-patches:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Keeps major updates separate for careful review
      action-major:
        patterns:
          - "*"
        update-types:
          - "major"

